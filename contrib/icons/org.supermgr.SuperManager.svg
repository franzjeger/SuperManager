<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a4a7f"/>
      <stop offset="100%" stop-color="#1a365d"/>
    </linearGradient>
  </defs>
  <!-- Shield shape -->
  <path d="M64 8 L112 28 C112 28 116 72 98 96 C86 112 64 120 64 120 C64 120 42 112 30 96 C12 72 16 28 16 28 Z"
        fill="url(#shieldGrad)" stroke="#0f2440" stroke-width="2" stroke-linejoin="round"/>
  <!-- Network nodes: three circles connected by lines -->
  <!-- Central node -->
  <circle cx="64" cy="62" r="8" fill="#ffffff" opacity="0.95"/>
  <!-- Top node -->
  <circle cx="64" cy="38" r="6" fill="#ffffff" opacity="0.85"/>
  <!-- Bottom-left node -->
  <circle cx="42" cy="84" r="6" fill="#ffffff" opacity="0.85"/>
  <!-- Bottom-right node -->
  <circle cx="86" cy="84" r="6" fill="#ffffff" opacity="0.85"/>
  <!-- Connection lines -->
  <line x1="64" y1="44" x2="64" y2="54" stroke="#ffffff" stroke-width="2.5" opacity="0.7"/>
  <line x1="48" y1="80" x2="58" y2="68" stroke="#ffffff" stroke-width="2.5" opacity="0.7"/>
  <line x1="80" y1="80" x2="70" y2="68" stroke="#ffffff" stroke-width="2.5" opacity="0.7"/>
  <!-- Horizontal link between bottom nodes through center -->
  <line x1="48" y1="84" x2="80" y2="84" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
</svg>
