<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  Access policy for org.supermgr.Daemon.

  The daemon runs privileged operations (modifies routes, opens TUN devices,
  reads SSH key material, manipulates nftables) and must not be reachable
  from arbitrary local users.  We restrict callers to:

    - root (the service itself, plus admin scripts)
    - members of the `supermgr` group (the GUI's desktop user)

  The packaging adds the `supermgr` group on install and recommends adding
  the desktop user to it; the GUI then talks to the daemon directly without
  pkexec or polkit prompts on every action.
-->
<busconfig>
  <policy user="root">
    <allow own="org.supermgr.Daemon"/>
    <allow send_destination="org.supermgr.Daemon"/>
  </policy>
  <policy group="supermgr">
    <allow send_destination="org.supermgr.Daemon"/>
  </policy>
  <policy context="default">
    <deny send_destination="org.supermgr.Daemon"/>
  </policy>
</busconfig>
