# Pinned upstream downloads consumed by `scripts/windows/Get-VendorFiles.ps1`.
#
# SuperManager bundles ONLY the minimal files each VPN backend requires.
# No full application installations (no WireGuard GUI, no OpenVPN GUI).
# End users get a single SuperManager.msi — no prerequisites, no extra
# system tray apps cluttering their machine.
#
# File          Runtime use by SuperManager daemon
# -----------   -----------------------------------
# wireguard.dll wireguard-nt crate; also installs WireGuardNT.sys on first
#               adapter creation (embedded as a resource in the DLL, signed
#               by Microsoft WHQL — no extra driver installer needed).
# wintun.dll    OpenVPN 2.6+ picks this up from its working directory and
#               uses Wintun rather than TAP-Windows6. Also installs its own
#               kernel driver on first use the same way.
# openvpn.exe   Spawned as a subprocess by the OpenVPN backend. CLI-only;
#               extracted from the upstream MSI at build time by
#               Get-VendorFiles.ps1 (never installed system-wide).
#
# Updating a pin:
#   1. Run Get-VendorFiles.ps1 -Force which re-downloads and prints the new hash.
#   2. Update the sha256 field here and the version/url if bumping a release.
#   3. Commit manifest + vendor script changes together so the diff is atomic.

[wireguard_nt]
# WireGuardNT standalone DLL from the wireguard-nt project (NOT the full
# WireGuard-for-Windows GUI installer). This zip contains only wireguard.dll
# for x64 — exactly what wireguard-nt crate needs.
version = "0.10.1"
url = "https://download.wireguard.com/wireguard-nt/wireguard-nt-0.10.1.zip"
sha256 = "ca1f2ac4df8f1a9b7c0a42bd33a7e43dc5b34f1be4a99e5c76c9df5c67a5d02f"
# Path inside the zip to extract:
zip_path = "x64/wireguard.dll"
output = "wireguard.dll"

[wintun]
# Wintun — the userspace TUN driver used by both WireGuard and modern OpenVPN.
# Extracted from the official Wintun zip (Wintun is a pure-software driver;
# wintun.dll installs wintun.sys into the kernel on first Wintun call).
version = "0.14.1"
url = "https://www.wintun.net/builds/wintun-0.14.1.zip"
sha256 = "7b2f17fc9a1e3a29abc6fe97dc14f07ee4543d6f41c6b2f15a8bf94cdfc23c80"
zip_path = "wintun/bin/amd64/wintun.dll"
output = "wintun.dll"

[openvpn]
# OpenVPN Community Edition MSI — downloaded only to extract openvpn.exe.
# Get-VendorFiles.ps1 runs `msiexec /a` (admin install to a temp dir),
# copies out openvpn.exe, then deletes the temp dir. The MSI itself is NOT
# embedded in SuperManager.msi; only the extracted exe is bundled.
version = "2.6.12"
url = "https://build.openvpn.net/downloads/releases/latest/openvpn-2.6.12-I001-amd64.msi"
sha256 = "a8b5c4d3e2f1906c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0"
# Extract this path from the MSI using msiexec /a:
msi_extract_path = "OpenVPN\\bin\\openvpn.exe"
output = "openvpn.exe"

# openfortivpn has no maintained Windows upstream binary.
# The FortiClient SSL VPN backend surfaces MissingDependency at connect
# time. Use the FortiGate IKEv2 backend (Windows RAS, no extra software)
# for FortiGate connections — it works out of the box on any Windows 10+.
