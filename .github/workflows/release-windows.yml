name: Release (Windows MSI)
# Triggered alongside `release.yml` when a `v*` tag is pushed. Builds
# two installer artifacts and uploads both to the matching GitHub
# Release:
#
#   * SuperManager-<version>.msi          - bare MSI (no driver bundle)
#   * SuperManager-Setup-<version>.exe    - Burn bootstrapper chaining
#                                            WireGuard + OpenVPN + the
#                                            SuperManager MSI
#
# The Burn bundle is the recommended install for end users: one .exe,
# auto-installs the WireGuardNT driver + OpenVPN's TAP-Windows6 driver
# alongside SuperManager itself. The bare MSI is published for users
# who already have those installed (or who manage the dependencies
# separately, e.g. via Group Policy).
#
# # Code signing (no EV cert today)
#
# Both artifacts are unsigned. Windows SmartScreen flags unsigned EXEs
# / MSIs with a "Windows protected your PC" prompt that requires the
# user to click "More info" -> "Run anyway". The published `.sha256`
# sidecars let users verify they got the binary CI built.
#
# To wire signing in once you procure a cert:
#   1. Add two repo secrets: `WINDOWS_PFX_BASE64`, `WINDOWS_PFX_PASSWORD`
#   2. Uncomment the `Sign artifacts` step below
#   3. After 200+ signed downloads SmartScreen reputation accumulates
#      and the prompt goes away automatically.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  windows-msi:
    runs-on: windows-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cargo build (release)
        run: |
          cargo build --release `
            -p supermgrd-win `
            -p supermgr-win `
            -p supermgr-mcp

      - name: Install WiX v5
        run: |
          dotnet tool install --global wix --version 5.0.2
          wix extension add WixToolset.UI.wixext/5.0.2 --global
          wix extension add WixToolset.Util.wixext/5.0.2 --global
          wix extension add WixToolset.BootstrapperApplications.wixext/5.0.2 --global

      # Download + hash-verify the upstream WireGuard + OpenVPN MSIs
      # against `vendor/manifest.toml`. The Burn bundle embeds them
      # so end users don't have to install WireGuard for Windows /
      # OpenVPN Community separately. A hash mismatch fails the build
      # immediately - that's the integrity check against a tampered
      # upstream CDN.
      - name: Stage vendor binaries
        run: .\scripts\windows\Get-VendorFiles.ps1

      - name: Build MSI + Burn bundle
        run: .\installer\wix\build-msi.ps1 -SkipBuild -Bundle

      # ----- Optional signing block (commented out until a cert exists) ----
      # - name: Sign artifacts
      #   if: env.WINDOWS_PFX_BASE64 != ''
      #   env:
      #     WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
      #     WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
      #   run: |
      #     $pfxPath = "$env:RUNNER_TEMP\codesign.pfx"
      #     [System.IO.File]::WriteAllBytes(
      #       $pfxPath,
      #       [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64)
      #     )
      #     $signtool = (Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
      #         Where-Object { $_.FullName -match '\\x64\\signtool.exe$' } |
      #         Select-Object -First 1).FullName
      #     & $signtool sign /fd SHA256 `
      #         /tr http://timestamp.digicert.com /td SHA256 `
      #         /f $pfxPath /p $env:WINDOWS_PFX_PASSWORD `
      #         installer\wix\SuperManager.msi `
      #         installer\wix\SuperManager-Setup.exe
      #     Remove-Item $pfxPath

      - name: Rename + hash artifacts
        shell: pwsh
        run: |
          $version = "$env:GITHUB_REF_NAME".TrimStart('v')
          $msi = "installer\wix\SuperManager-$version.msi"
          $exe = "installer\wix\SuperManager-Setup-$version.exe"
          Move-Item "installer\wix\SuperManager.msi"        $msi
          Move-Item "installer\wix\SuperManager-Setup.exe"  $exe
          foreach ($p in @($msi, $exe)) {
              $hash = (Get-FileHash $p -Algorithm SHA256).Hash
              "$hash  $(Split-Path -Leaf $p)" |
                  Out-File -FilePath "$p.sha256" -Encoding ascii
              Write-Host "SHA-256 $(Split-Path -Leaf $p): $hash"
          }
          "MSI_PATH=$msi"              | Out-File -FilePath $env:GITHUB_ENV -Append
          "EXE_PATH=$exe"              | Out-File -FilePath $env:GITHUB_ENV -Append
          "MSI_SHA256_PATH=$msi.sha256" | Out-File -FilePath $env:GITHUB_ENV -Append
          "EXE_SHA256_PATH=$exe.sha256" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            ${{ env.EXE_PATH }}
            ${{ env.EXE_SHA256_PATH }}
            ${{ env.MSI_PATH }}
            ${{ env.MSI_SHA256_PATH }}
          generate_release_notes: false
          fail_on_unmatched_files: true
