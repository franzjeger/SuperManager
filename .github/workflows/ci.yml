name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to read-only. Individual jobs/steps can opt in to more.
permissions:
  contents: read

jobs:
  # Linux build — exercises the `default-members` crates only
  # (supermgr-core, supermgrd, supermgr, supermgr-mcp). The Mac stack
  # (supermgr-engine, supermgrd-mac, supermanager-helper, SuperManagerMac)
  # is platform-gated out via target_os and is covered by the
  # `mac` job below.
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libssl-dev pkg-config
      # All three steps respect `default-members` in the workspace
      # Cargo.toml — they touch only Linux crates and skip the Mac stack.
      - name: Build
        run: cargo build --release
      - name: Clippy
        run: cargo clippy -- -W warnings
      - name: Tests
        run: cargo test

  # macOS build + test — exercises the Mac-only Rust crates plus
  # the SwiftUI app via `xcodebuild test`. Signing is disabled
  # because GitHub-hosted runners have no Apple Developer identity.
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      # xcodegen turns `SuperManagerMac/project.yml` → `.xcodeproj`.
      # pandoc is the engagement-report renderer; install so report
      # tests (if/when added) don't get skipped.
      - name: Install build deps
        run: |
          brew update
          brew install xcodegen pandoc xcbeautify

      # Build the Mac stack explicitly. We can't use `--workspace`
      # because that would also pull in `supermgr` (the Linux GTK
      # GUI) whose pango-sys dependency doesn't build on macOS.
      # Same `-p <crate>` list the local `build.sh` uses.
      - name: Build (Mac crates)
        run: |
          cargo build --release \
            -p supermgr-core \
            -p supermgr-engine \
            -p supermgrd-mac \
            -p supermanager-helper

      - name: Tests (Mac crates)
        run: |
          cargo test \
            -p supermgr-core \
            -p supermgr-engine \
            -p supermgrd-mac \
            -p supermanager-helper

      # Generate the Xcode project from project.yml.
      - name: xcodegen
        run: |
          cd SuperManagerMac
          xcodegen generate

      # Run the Swift unit-test target (`SuperManagerMacTests`).
      # `xcodebuild test` builds the host app AND the test bundle,
      # then runs every XCTest in the test target. Signing disabled
      # because the runner has no Developer identity.
      #
      # Pipe raw xcodebuild output to a log file as well as
      # xcbeautify — the GitHub-actions renderer hides the actual
      # error text and we need the raw form when a compile fails.
      - name: Test (SwiftUI + XCTest)
        shell: bash
        run: |
          set -o pipefail
          cd SuperManagerMac
          xcodebuild test \
            -project SuperManager.xcodeproj \
            -scheme SuperManagerMac \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 \
            | tee /tmp/xcodebuild.log \
            | xcbeautify --renderer github-actions \
            || {
                echo "::group::Raw xcodebuild output (last 200 lines)"
                tail -200 /tmp/xcodebuild.log
                echo "::endgroup::"
                echo "::group::Compile errors only"
                grep -E "error:|warning:" /tmp/xcodebuild.log | head -50 || true
                echo "::endgroup::"
                exit 1
            }

  # Windows build — exercises the Windows-only crates (supermgrd-win,
  # supermgr-win) plus the cross-platform supermgr-core / supermgr-mcp.
  # The Linux daemon (supermgrd) and Mac stack are excluded because
  # their D-Bus / strongSwan / launchd deps don't exist on Windows.
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Build (Windows crates)
        run: |
          cargo build --release `
            -p supermgr-core `
            -p supermgr-mcp `
            -p supermgrd-win `
            -p supermgr-win

      - name: Tests (cross-platform crates)
        run: |
          cargo test `
            -p supermgr-core `
            -p supermgr-mcp

      # Build the MSI on every push to main + every PR — catches WiX
      # schema mistakes before they hit a release tag. Cached
      # extensions across runs would be nice but `wix extension add`
      # is fast enough not to bother.
      - name: Install WiX v5
        run: |
          dotnet tool install --global wix --version 5.0.2
          wix extension add WixToolset.UI.wixext/5.0.2 --global
          wix extension add WixToolset.Util.wixext/5.0.2 --global

      - name: Build MSI
        run: .\installer\wix\build-msi.ps1 -SkipBuild

      - name: Upload MSI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: SuperManager-msi-${{ github.sha }}
          path: installer/wix/SuperManager.msi
          retention-days: 14
