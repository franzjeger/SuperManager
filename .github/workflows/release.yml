name: Release
# Triggered when a `v*` tag is pushed. Builds the Release config,
# signs it with the Developer ID Application certificate, submits
# to Apple's notary, staples the ticket, signs the artifact with
# Sparkle's EdDSA key, generates an appcast entry, and uploads
# everything to the matching GitHub Release.
#
# Required repository secrets (Settings → Secrets and variables →
# Actions → Repository secrets):
#
#   MACOS_CERTIFICATE         — Developer ID Application .p12,
#                                base64-encoded. Export from Keychain
#                                Access ("My Certificates" → cert →
#                                right-click → Export → .p12 →
#                                `base64 -i cert.p12 -o cert.b64`)
#   MACOS_CERTIFICATE_PASSWORD — Password you chose when exporting
#   MACOS_DEV_ID_APP          — Common Name from `security find-identity`,
#                                e.g. "Developer ID Application: Your Name (TEAM_ID)"
#   AC_API_KEY_BASE64         — `base64 -i AuthKey_XXXXXX.p8 -o key.b64`
#   AC_API_KEY_ID             — 10-char key id from App Store Connect
#   AC_API_ISSUER_ID          — UUID from App Store Connect → Integrations
#   SPARKLE_PRIVATE_KEY       — Sparkle EdDSA private key (base64).
#                                Export with:
#                                  `security find-generic-password
#                                     -a ed25519 -s 'https://sparkle-project.org'
#                                     -w | tr -d '\n'`
#                                Note: this is the most sensitive secret.
#                                Compromise = ability to push malicious
#                                updates to all installed copies. Rotate
#                                via `sparkle-keygen.sh --force` if
#                                ever exposed.

on:
  push:
    tags:
      - 'v*.*.*'

# Tighten workflow default to read-only — only the release job
# opts in to `contents: write` for the GitHub Release upload.
permissions:
  contents: read

jobs:
  release:
    runs-on: macos-latest
    # Manual approval gate. Configure the `release` environment in
    # repo Settings → Environments with at least one required
    # reviewer. A stolen push token can push a tag but can't bypass
    # the reviewer prompt — which is the only thing between a tag
    # push and a Sparkle-signed update shipping to every install.
    environment: release
    permissions:
      # Required for `softprops/action-gh-release` to attach assets.
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install build deps
        run: |
          brew update
          brew install xcodegen pandoc xcbeautify

      # Set up a *temporary* keychain just for this run. We import
      # the Developer ID cert into it, then nuke the keychain at
      # the end. Avoids leaving build credentials on the runner.
      - name: Set up signing keychain
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          # Random one-shot keychain password
          KCHAIN_PW=$(openssl rand -hex 16)
          echo "KCHAIN_PW=$KCHAIN_PW" >> "$GITHUB_ENV"
          security create-keychain -p "$KCHAIN_PW" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KCHAIN_PW" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 \
            -k build.keychain \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KCHAIN_PW" \
            build.keychain
          rm -f /tmp/cert.p12
          security find-identity -p codesigning -v build.keychain

      # Stage the App Store Connect API key for notarytool.
      - name: Stage AC API key
        env:
          AC_API_KEY_BASE64: ${{ secrets.AC_API_KEY_BASE64 }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          mkdir -p ~/.appstoreconnect
          chmod 700 ~/.appstoreconnect
          echo "$AC_API_KEY_BASE64" | base64 --decode > "$HOME/.appstoreconnect/AuthKey_${AC_API_KEY_ID}.p8"
          chmod 600 "$HOME/.appstoreconnect/AuthKey_${AC_API_KEY_ID}.p8"
          echo "AC_API_KEY_PATH=$HOME/.appstoreconnect/AuthKey_${AC_API_KEY_ID}.p8" >> "$GITHUB_ENV"

      # Stage the Sparkle private key into the same temp keychain
      # so `sign_update` can find it. Sparkle's tool looks for a
      # generic password labelled `https://sparkle-project.org`.
      - name: Stage Sparkle EdDSA key
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          # The secret is the raw private-key string (base64 of the
          # 32-byte ed25519 seed), exported on the dev machine via:
          #   security find-generic-password -a ed25519 \
          #     -s 'https://sparkle-project.org' -w | tr -d '\n'
          security add-generic-password \
            -a ed25519 \
            -s 'https://sparkle-project.org' \
            -w "$SPARKLE_PRIVATE_KEY" \
            -T /usr/bin/security \
            build.keychain
          # ACL grant so sign_update can read it without a prompt
          security set-key-partition-list \
            -S apple-tool:,apple:,unsigned: \
            -s -k "$KCHAIN_PW" \
            build.keychain

      # Pre-resolve SwiftPM packages so `release.sh` can find
      # `generate_keys`/`sign_update` inside DerivedData.
      - name: Resolve SwiftPM packages
        run: |
          cd SuperManagerMac
          xcodegen generate
          xcodebuild -resolvePackageDependencies \
            -project SuperManager.xcodeproj \
            -scheme SuperManagerMac

      - name: Build, sign, notarise, staple, Sparkle-sign
        env:
          DEVELOPER_ID_APP: ${{ secrets.MACOS_DEV_ID_APP }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          # AC_API_KEY_PATH set by the earlier step via GITHUB_ENV
        run: |
          set -euo pipefail
          # Extract version from tag — `v1.2.3` → `1.2.3`
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Releasing v$VERSION"
          ./scripts/release.sh "$VERSION"

      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/SuperManager-*.zip
            dist/appcast.xml
          generate_release_notes: true
          fail_on_unmatched_files: true

      # Always clean up the temporary keychain so a failed run
      # doesn't leave the signing identity sitting on the runner
      # (GitHub-hosted runners are ephemeral but defence in depth).
      - name: Tear down keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true
          rm -f "$HOME/.appstoreconnect/AuthKey_"*.p8 || true
